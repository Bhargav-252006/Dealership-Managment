services:
  - type: web
    name: dealer-backend
    env: node
    rootDir: backend-node
    buildCommand: npm install && npx prisma generate
    startCommand: node src/index.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: DATABASE_URL
        sync: false # Requires manual setup in Render Dashboard
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: dealer-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: dealer-backend
          property: host
